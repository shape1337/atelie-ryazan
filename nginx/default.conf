server {
  listen 80;
  server_name _;

  # Указываем Nginx использовать кастомный файл при ошибке 404
  error_page 404 /404.html;

  # Serve static files
  location / {
    root /usr/share/nginx/html;
    # Изменяем логику: если файл или папка не найдены, Nginx вернет честную ошибку 404,
    # а директива error_page выше перенаправит её на красивый 404.html
    try_files $uri $uri/ =404;
  }

  # Явно указываем обработку файла ошибки, чтобы он брался из корня статики
  location = /404.html {
    root /usr/share/nginx/html;
    internal;
  }

  # Proxy API requests to backend
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Optional: increase client body size for uploads
  client_max_body_size 10M;
}